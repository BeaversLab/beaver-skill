version: 2
llmApiKeyEnv: LLM_API_KEY
defaults:
  hours: 48
  topN: 15
  language: zh
  outputDir: ./output
  reportTemplate: default
llms:
  - provider: ZHIPU
    enabled: true
    apiType: openai-compatible
    baseUrl: https://open.bigmodel.cn/api/coding/paas/v4
    model: glm-4.7
  - provider: ZHIPU
    enabled: false
    apiType: anthropic-compatible
    baseUrl: https://open.bigmodel.cn/api/anthropic
    model: glm-4.7
categories:
  - id: ai-ml
    emoji: "🤖"
    label: AI / ML
  - id: security
    emoji: "🔒"
    label: 安全
  - id: engineering
    emoji: "⚙️"
    label: 工程
  - id: tools
    emoji: "🛠"
    label: 工具 / 开源
  - id: opinion
    emoji: "💡"
    label: 观点 / 杂谈
  - id: other
    emoji: "📝"
    label: 其他
prompts:
  scoring: |
    你是一个技术内容策展人，正在为一份面向技术爱好者的每日精选摘要筛选文章。

    请对以下文章进行三个维度的评分（1-10 整数，10 分最高），并为每篇文章分配一个分类标签和提取 2-4 个关键词。

    ## 评分维度

    ### 1. 相关性 (relevance) - 对技术/编程/AI/互联网从业者的价值
    - 10: 所有技术人都应该知道的重大事件/突破
    - 7-9: 对大部分技术从业者有价值
    - 4-6: 对特定技术领域有价值
    - 1-3: 与技术行业关联不大

    ### 2. 质量 (quality) - 文章本身的深度和写作质量
    - 10: 深度分析，原创洞见，引用丰富
    - 7-9: 有深度，观点独到
    - 4-6: 信息准确，表达清晰
    - 1-3: 浅尝辄止或纯转述

    ### 3. 时效性 (timeliness) - 当前是否值得阅读
    - 10: 正在发生的重大事件/刚发布的重要工具
    - 7-9: 近期热点相关
    - 4-6: 常青内容，不过时
    - 1-3: 过时或无时效价值

    ## 分类标签（必须从以下选一个）
    {{categoryOptions}}

    ## 关键词提取
    提取 2-4 个最能代表文章主题的关键词（用英文，简短，如 "Rust", "LLM", "database", "performance"）

    ## 待评分文章

    {{articlesList}}

    请严格按 JSON 格式返回，不要包含 markdown 代码块或其他文字：
    {
      "results": [
        {
          "index": 0,
          "relevance": 8,
          "quality": 7,
          "timeliness": 9,
          "category": "engineering",
          "keywords": ["Rust", "compiler", "performance"]
        }
      ]
    }
  summary: |
    你是一个技术内容摘要专家。请为以下文章完成三件事：

    1. **中文标题** (titleZh): 将英文标题翻译成自然的中文。如果原标题已经是中文则保持不变。
    2. **摘要** (summary): 4-6 句话的结构化摘要，让读者不点进原文也能了解核心内容。包含：
       - 文章讨论的核心问题或主题（1 句）
       - 关键论点、技术方案或发现（2-3 句）
       - 结论或作者的核心观点（1 句）
    3. **推荐理由** (reason): 1 句话说明"为什么值得读"，区别于摘要（摘要说"是什么"，推荐理由说"为什么"）。

    {{languageInstruction}}

    摘要要求：
    - 直接说重点，不要用"本文讨论了..."、"这篇文章介绍了..."这种开头
    - 包含具体的技术名词、数据、方案名称或观点
    - 保留关键数字和指标（如性能提升百分比、用户数、版本号等）
    - 如果文章涉及对比或选型，要点出比较对象和结论
    - 目标：读者花 30 秒读完摘要，就能决定是否值得花 10 分钟读原文

    ## 待摘要文章

    {{articlesList}}

    请严格按 JSON 格式返回：
    {
      "results": [
        {
          "index": 0,
          "titleZh": "中文翻译的标题",
          "summary": "摘要内容...",
          "reason": "推荐理由..."
        }
      ]
    }
  highlights: |
    根据以下今日精选技术文章列表，写一段 3-5 句话的"今日看点"总结。
    要求：
    - 提炼出今天技术圈的 2-3 个主要趋势或话题
    - 不要逐篇列举，要做宏观归纳
    - 风格简洁有力，像新闻导语
    {{languageInstruction}}

    文章列表：
    {{articleList}}

    直接返回纯文本总结，不要 JSON，不要 markdown 格式。
